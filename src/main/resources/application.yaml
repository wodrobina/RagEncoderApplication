server:
  port: 8085

ollama:
  base-url: http://localhost:11434
  connect-timeout: 5s
  read-timeout: 60s

rag:
  reranking:
    enabled: true
    strategy: lexical-overlap
    candidate-limit: 20
    vector-weight: 0.7
    lexical-weight: 0.3

embedding:
  provider: ollama
  model: bge-m3
  dimension: 1024

qdrant:
  host: 192.168.87.80
  grpc-port: 6334
  rest-port: 6333
  api-key: ${QDRANT_API_KEY:}
  collection: documents
  vector-size: 1024
  distance: Cosine
  use-tls: false

chunking:
  max-chars: 1200
  overlap-chars: 200

indexing:
  batch-size: 64

ingestion:
  input-dir: ./test-data
  allowed-extensions:
    - .txt
    - .md
    - .pdf